<div class="container-forgot">
  <div *ngIf="!correoEnviado" class="card-forgot">
    <h2>Recuperar Contraseña</h2>
    <p class="instrucciones">Introduce tu correo electrónico para enviarte un enlace de restablecimiento.</p>

    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input 
        type="email" 
        id="email" 
        [(ngModel)]="email" 
        placeholder="ejemplo@correo.com"
        [disabled]="cargando"
      />
    </div>

    <button 
      class="btn-enviar" 
      [disabled]="cargando || !email" 
      (click)="enviarLink()"
    >
      {{ cargando ? 'Enviando...' : 'Enviar link' }}
    </button>
  </div>

  <!-- 📄 MENSAJE GENÉRICO EXIGIDO -->
  <div *ngIf="correoEnviado" class="card-success">
    <div class="icono-check">✉️</div>
    <h3>Proceso Iniciado</h3>
    <p>Si el email existe en nuestro sistema, recibirás un enlace para restablecer tu contraseña en los próximos minutos.</p>
    <a routerLink="/login" class="back-link">Volver al Inicio de Sesión</a>
  </div>
</div>
